version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: studyportal
      POSTGRES_USER: studyportal
      POSTGRES_PASSWORD: studyportal_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyportal"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: study-portal-cluster
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9092'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  rustfs:
    image: rustfs/rustfs
    environment:
      RUSTFS_ACCESS_KEY: studyportal
      RUSTFS_SECRET_KEY: studyportal_pass
    volumes:
      - rustfs_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://studyportal:studyportal_pass@postgres:5432/studyportal
      SECRET_KEY: change-me-in-production-use-openssl-rand-hex-32
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      RUSTFS_ENDPOINT: http://rustfs:9000
      RUSTFS_PUBLIC_ENDPOINT: http://localhost:9000
      RUSTFS_ACCESS_KEY: studyportal
      RUSTFS_SECRET_KEY: studyportal_pass
      RUSTFS_BUCKET: study-portal
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_SUBMISSION_TOPIC: homework.submitted
      KAFKA_GRADED_TOPIC: homework.graded
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_started
      kafka:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: study-portal
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    container_name: study_map_ocr
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_INPUT_TOPIC: ${KAFKA_INPUT_TOPIC:-homework.submitted}
      KAFKA_OUTPUT_TOPIC: ${KAFKA_OUTPUT_TOPIC:-homework.extracted}
      S3_ENDPOINT_URL: http://rustfs:9000
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-studyportal}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-studyportal_pass}
      AWS_REGION: us-east-1
      OCR_ENGINE: ${OCR_ENGINE:-easyocr}
      OCR_LANGS: ${OCR_LANGS:-en}
      OCR_POSTPROCESS_EN: ${OCR_POSTPROCESS_EN:-true}
      OCR_DEMO_LLM_CLEANUP: ${OCR_DEMO_LLM_CLEANUP:-true}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434/api/generate}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b-instruct}
    ports:
      - "8002:8002"
    volumes:
      - ./ocr-service:/app
      - ocr_model_cache:/root/.cache/huggingface
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8002/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s


  grading-service:
    build: ./grading-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_INPUT_TOPIC: homework.extracted
      KAFKA_OUTPUT_TOPIC: homework.graded
      GEMINI_API_KEY: ${GEMINI_API_KEY:-<PUT_GEMINI_API_KEY_HERE>}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GRADING_OLLAMA_FALLBACK: ${GRADING_OLLAMA_FALLBACK:-true}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434/api/generate}
      GRADING_OLLAMA_MODEL: ${GRADING_OLLAMA_MODEL:-mistral:7b}
    ports:
      - "8001:8000"
    volumes:
      - ./grading-service:/app
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  analytics:
    build: ./analytics
    ports:
      - "8003:8002"
    environment:
      DATABASE_URL: postgresql://studyportal:studyportal_pass@postgres:5432/studyportal
      GROQ_API_KEY: ${GROQ_API_KEY:-<PUT_GROQ_API_KEY_HERE>}
      KAFKA_BOOTSTRAP: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./analytics:/app
    restart: unless-stopped

  analytics-frontend:
    build: ./analytics-frontend
    ports:
      - "3001:80"
    depends_on:
      - analytics
    restart: unless-stopped

volumes:
  postgres_data:
  rustfs_data:
  kafka_data:
  ocr_model_cache:
